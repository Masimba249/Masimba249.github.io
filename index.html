<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="Collins Masimba — Embedded AI & Automation Engineer. Böblingen, Germany. STM32, ROS2, TinyML, Siemens TIA Portal, FreeRTOS, EtherCAT."/>
  <meta name="robots" content="index, follow"/>
  <title>Collins Masimba | Embedded AI & Robotics Engineer | Böblingen, Germany</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    /* ══════════════════════════════════════════════════
       RESET & ROOT — GERMAN ENGINEERING PROFESSIONAL
    ══════════════════════════════════════════════════ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:          #06101f;
      --bg-card:     #0c1828;
      --bg-card2:    #101f34;
      --accent:      #1a75e8;   /* Corporate engineering blue */
      --accent2:     #e07b1a;   /* RAL 2011 amber / engineering orange */
      --accent3:     #00b37d;   /* Status green */
      --text:        #dde5ef;
      --text-muted:  #7a8fa8;
      --border:      #172133;
      --border2:     #1f2f43;
      --mono:        'JetBrains Mono', monospace;
    }
    html { scroll-behavior: smooth; }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); line-height: 1.7; overflow-x: hidden; }
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 2px; }

    /* ══════════════════════════════════════════════════
       DSGVO CONSENT BANNER
    ══════════════════════════════════════════════════ */
    #dsgvo-banner {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 9999;
      background: var(--bg-card); border-top: 2px solid var(--accent);
      padding: 1rem 2rem;
      display: flex; align-items: center; gap: 1.5rem; flex-wrap: wrap;
    }
    #dsgvo-banner.hidden { display: none; }
    .dsgvo-text { font-size: 0.8rem; color: var(--text-muted); flex: 1; min-width: 240px; line-height: 1.6; }
    .dsgvo-text strong { color: var(--text); }
    .dsgvo-text a { color: var(--accent); text-decoration: none; }
    .dsgvo-text a:hover { text-decoration: underline; }
    .dsgvo-btns { display: flex; gap: 0.6rem; flex-shrink: 0; }
    .dsgvo-btn {
      padding: 0.45rem 1rem; border-radius: 4px; font-size: 0.78rem;
      font-weight: 600; cursor: pointer; border: 1px solid; transition: all 0.2s;
      font-family: 'Inter', sans-serif;
    }
    .dsgvo-accept { background: var(--accent); color: #fff; border-color: var(--accent); }
    .dsgvo-accept:hover { background: #1260c4; }
    .dsgvo-decline { background: transparent; color: var(--text-muted); border-color: var(--border2); }
    .dsgvo-decline:hover { color: var(--text); border-color: var(--text-muted); }

    /* ══════════════════════════════════════════════════
       NAVBAR
    ══════════════════════════════════════════════════ */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
      background: rgba(6,16,31,0.96); backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border);
      padding: 0 2rem; height: 58px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .nav-logo {
      font-family: var(--mono); font-size: 0.92rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.3px;
    }
    .nav-links { display: flex; gap: 1.5rem; list-style: none; align-items: center; }
    .nav-links a {
      color: var(--text-muted); text-decoration: none; font-size: 0.8rem;
      font-weight: 500; transition: color 0.2s;
    }
    .nav-links a:hover { color: var(--text); }
    .nav-cv {
      display: inline-flex; align-items: center; gap: 0.35rem;
      color: var(--accent3) !important;
      border: 1px solid rgba(0,179,125,0.28); border-radius: 4px;
      padding: 0.22rem 0.65rem; font-size: 0.75rem !important;
      transition: background 0.2s !important;
    }
    .nav-cv:hover { background: rgba(0,179,125,0.08) !important; border-color: var(--accent3) !important; }
    .nav-toggle { display: none; background: none; border: none; color: var(--text); font-size: 1.1rem; cursor: pointer; padding: 0.4rem; }
    @media (max-width: 900px) {
      .nav-toggle { display: block; }
      .nav-links {
        display: none; flex-direction: column; position: absolute;
        top: 58px; left: 0; right: 0; background: rgba(6,16,31,0.98);
        border-bottom: 1px solid var(--border); padding: 1rem 2rem; gap: 0.75rem;
      }
      .nav-links.open { display: flex; }
    }
    .lang-switch {
      display: inline-flex; align-items: center;
      background: var(--bg-card2); border: 1px solid var(--border);
      border-radius: 3px; overflow: hidden;
    }
    .lang-btn {
      padding: 0.18rem 0.5rem; border: none; background: transparent;
      color: var(--text-muted); font-size: 0.7rem; font-weight: 700;
      cursor: pointer; transition: all 0.2s; font-family: 'Inter', sans-serif;
    }
    .lang-btn.active { background: var(--accent); color: #fff; }
    .lang-btn:hover:not(.active) { color: var(--text); }

    /* ══════════════════════════════════════════════════
       BUTTONS
    ══════════════════════════════════════════════════ */
    .btn {
      display: inline-flex; align-items: center; gap: 0.45rem;
      padding: 0.65rem 1.35rem; border-radius: 5px;
      font-size: 0.85rem; font-weight: 600; text-decoration: none;
      transition: all 0.2s; cursor: pointer; border: 1px solid transparent;
      font-family: 'Inter', sans-serif;
    }
    .btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
    .btn-primary:hover { background: #1260c4; border-color: #1260c4; }
    .btn-outline { background: transparent; color: var(--text); border-color: var(--border2); }
    .btn-outline:hover { border-color: var(--accent); color: var(--accent); }
    .btn-download { background: transparent; color: var(--accent3); border-color: rgba(0,179,125,0.35); }
    .btn-download:hover { background: rgba(0,179,125,0.08); border-color: var(--accent3); }

    /* ══════════════════════════════════════════════════
       SECTIONS
    ══════════════════════════════════════════════════ */
    section { padding: 88px 2rem; }
    .container { max-width: 1060px; margin: 0 auto; }
    .section-header { margin-bottom: 2.75rem; }
    .section-eyebrow {
      display: block; font-family: var(--mono); font-size: 0.68rem;
      color: var(--accent); letter-spacing: 3px; text-transform: uppercase;
      margin-bottom: 0.5rem; font-weight: 500;
    }
    .section-title {
      font-size: clamp(1.55rem, 3.2vw, 2.1rem); font-weight: 700;
      color: var(--text); letter-spacing: -0.25px; line-height: 1.2;
    }
    .section-title .hl { color: var(--accent); }
    .section-rule { width: 36px; height: 2px; background: var(--accent); margin-top: 0.85rem; }
    .section-desc { color: var(--text-muted); max-width: 520px; margin-top: 0.65rem; font-size: 0.88rem; }

    /* ══════════════════════════════════════════════════
       HERO
    ══════════════════════════════════════════════════ */
    .hero {
      min-height: 100vh; display: flex; align-items: center;
      position: relative; overflow: hidden; padding: 80px 2rem 60px;
    }
    .hero::before {
      content: ''; position: absolute; inset: 0; z-index: 0;
      background-image: radial-gradient(circle, rgba(26,117,232,0.14) 1px, transparent 1px);
      background-size: 28px 28px;
    }
    .hero::after {
      content: ''; position: absolute; inset: 0; z-index: 0;
      background: radial-gradient(ellipse 85% 75% at 50% 50%, transparent 30%, var(--bg) 100%);
    }
    .hero-content { position: relative; z-index: 1; max-width: 800px; }
    .hero-status {
      display: inline-flex; align-items: center; gap: 0.55rem;
      background: rgba(26,117,232,0.07); border: 1px solid rgba(26,117,232,0.2);
      border-radius: 3px; padding: 0.32rem 0.8rem;
      font-size: 0.75rem; color: var(--accent); font-weight: 500;
      margin-bottom: 2rem; font-family: var(--mono);
    }
    .status-dot { width: 6px; height: 6px; background: var(--accent3); border-radius: 50%; animation: blink 2.5s infinite; }
    @keyframes blink { 0%,100%{opacity:1}50%{opacity:0.25} }
    .hero h1 {
      font-size: clamp(2rem, 5.2vw, 3.6rem); font-weight: 800;
      line-height: 1.1; letter-spacing: -1px; margin-bottom: 0.7rem;
    }
    .hero h1 .name { color: var(--accent); }
    .hero-role { font-size: clamp(0.92rem, 1.8vw, 1.1rem); color: var(--text-muted); margin-bottom: 1.5rem; }
    .hero-chips { display: flex; flex-wrap: wrap; gap: 0.45rem; margin-bottom: 2.25rem; }
    .chip {
      background: var(--bg-card); border: 1px solid var(--border2);
      border-radius: 3px; padding: 0.25rem 0.65rem;
      font-size: 0.72rem; color: var(--text-muted); font-family: var(--mono);
    }
    .hero-btns { display: flex; gap: 0.65rem; flex-wrap: wrap; margin-bottom: 2.75rem; }
    .hero-stats {
      display: flex; gap: 2.25rem; flex-wrap: wrap;
      padding-top: 1.75rem; border-top: 1px solid var(--border);
    }
    .stat-val { font-size: 1.55rem; font-weight: 800; color: var(--accent); font-family: var(--mono); }
    .stat-label { font-size: 0.68rem; color: var(--text-muted); margin-top: 0.1rem; letter-spacing: 0.3px; }

    /* ══════════════════════════════════════════════════
       ABOUT
    ══════════════════════════════════════════════════ */
    #about { background: var(--bg-card); border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); }
    .about-grid { display: grid; grid-template-columns: 200px 1fr; gap: 3rem; align-items: start; }
    .about-avatar-wrap { display: flex; flex-direction: column; align-items: center; gap: 1.25rem; }
    .avatar-box {
      width: 172px; height: 172px; border-radius: 6px; overflow: hidden;
      border: 2px solid var(--accent); background: var(--bg-card2);
      display: flex; align-items: center; justify-content: center; font-size: 3.5rem;
    }
    .avatar-box img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .contact-list { display: flex; flex-direction: column; width: 100%; }
    .contact-item {
      display: flex; align-items: center; gap: 0.55rem; font-size: 0.75rem;
      color: var(--text-muted); padding: 0.45rem 0; border-bottom: 1px solid var(--border);
      text-decoration: none; transition: color 0.2s;
    }
    .contact-item:last-child { border-bottom: none; }
    .contact-item:hover { color: var(--accent); }
    .contact-item i { color: var(--accent); width: 15px; text-align: center; font-size: 0.82rem; }
    .about-text h3 {
      font-size: 0.68rem; font-weight: 700; color: var(--accent); letter-spacing: 2.5px;
      text-transform: uppercase; margin-bottom: 0.7rem; font-family: var(--mono);
    }
    .about-text p { color: var(--text-muted); font-size: 0.9rem; line-height: 1.88; margin-bottom: 1.2rem; }
    .about-chips { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-top: 0.25rem; }
    .about-chip {
      display: inline-flex; align-items: center; gap: 0.35rem;
      background: var(--bg-card2); border: 1px solid var(--border2);
      border-radius: 3px; padding: 0.28rem 0.65rem; font-size: 0.75rem; color: var(--text-muted);
    }
    .about-chip i { color: var(--accent3); font-size: 0.8rem; }

    /* ══════════════════════════════════════════════════
       TECH STACK STRIP
    ══════════════════════════════════════════════════ */
    #core-stack { background: var(--bg); border-bottom: 1px solid var(--border); padding: 32px 2rem; }
    .stack-eyebrow {
      text-align: center; margin-bottom: 1rem;
      font-family: var(--mono); font-size: 0.65rem; color: var(--text-muted);
      letter-spacing: 3px; text-transform: uppercase;
    }
    .stack-row { display: flex; flex-wrap: wrap; justify-content: center; gap: 0.6rem; max-width: 1060px; margin: 0 auto; }
    .stack-chip {
      display: flex; align-items: center; gap: 0.38rem;
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 3px; padding: 0.4rem 0.8rem;
      font-size: 0.75rem; font-weight: 500; color: var(--text-muted); transition: all 0.2s;
    }
    .stack-chip:hover { color: var(--text); border-color: rgba(26,117,232,0.45); }
    .stack-chip i { font-size: 0.9rem; width: 16px; text-align: center; }
    .eligibility-row {
      display: flex; align-items: center; justify-content: center; gap: 0.5rem;
      margin-top: 1.25rem; font-size: 0.75rem; color: var(--accent3); font-family: var(--mono);
    }
    .eligibility-row::before, .eligibility-row::after {
      content: ''; flex: 1; max-width: 100px; height: 1px; background: rgba(0,179,125,0.18);
    }

    /* ══════════════════════════════════════════════════
       EXPERIENCE
    ══════════════════════════════════════════════════ */
    #experience { background: var(--bg); }
    .timeline { position: relative; padding-left: 2.25rem; }
    .timeline::before {
      content: ''; position: absolute; left: 5px; top: 10px; bottom: 0;
      width: 1px; background: var(--border2);
    }
    .timeline-item { position: relative; padding-bottom: 1.75rem; }
    .timeline-item:last-child { padding-bottom: 0; }
    .t-marker {
      position: absolute; left: -2.25rem; top: 7px;
      width: 12px; height: 12px; border: 2px solid var(--accent);
      border-radius: 2px; background: var(--bg);
    }
    .t-marker.filled { background: var(--accent); }
    .t-marker.amber { border-color: var(--accent2); }
    .t-marker.amber.filled { background: var(--accent2); }
    .exp-card {
      background: var(--bg-card); border: 1px solid var(--border);
      border-left: 3px solid var(--accent);
      border-radius: 0 5px 5px 0; padding: 1.4rem; transition: border-color 0.2s;
    }
    .exp-card.amber { border-left-color: var(--accent2); }
    .exp-card:hover { border-color: var(--border2); border-left-color: inherit; }
    .exp-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 1rem; flex-wrap: wrap; margin-bottom: 0.35rem; }
    .exp-title { font-size: 0.97rem; font-weight: 700; color: var(--text); }
    .exp-badge {
      display: inline-flex; align-items: center; gap: 0.3rem;
      font-size: 0.67rem; font-weight: 600; padding: 0.18rem 0.55rem;
      border-radius: 3px; border: 1px solid; white-space: nowrap;
    }
    .exp-badge.current { color: var(--accent3); border-color: rgba(0,179,125,0.28); background: rgba(0,179,125,0.07); }
    .exp-badge.freelance { color: var(--accent2); border-color: rgba(224,123,26,0.28); background: rgba(224,123,26,0.07); }
    .exp-badge.research { color: var(--accent); border-color: rgba(26,117,232,0.28); background: rgba(26,117,232,0.07); }
    .exp-company { font-size: 0.85rem; color: var(--accent); font-weight: 600; margin-bottom: 0.18rem; }
    .exp-period { font-size: 0.72rem; color: var(--text-muted); margin-bottom: 0.85rem; font-family: var(--mono); }
    .exp-list { list-style: none; display: flex; flex-direction: column; gap: 0.45rem; }
    .exp-list li { padding-left: 1rem; position: relative; font-size: 0.855rem; color: var(--text-muted); line-height: 1.72; }
    .exp-list li::before { content: '—'; position: absolute; left: 0; color: var(--accent); font-size: 0.7rem; top: 3px; }
    .exp-tags { display: flex; flex-wrap: wrap; gap: 0.3rem; margin-top: 0.8rem; }
    .exp-tag {
      background: var(--bg-card2); border: 1px solid var(--border);
      border-radius: 2px; padding: 0.18rem 0.5rem; font-size: 0.68rem;
      color: var(--text-muted); font-family: var(--mono);
    }
    .exp-link {
      display: inline-flex; align-items: center; gap: 0.35rem;
      color: var(--accent); text-decoration: none; font-size: 0.75rem; font-weight: 600;
      margin-top: 0.8rem; transition: gap 0.2s;
    }
    .exp-link:hover { gap: 0.55rem; }

    /* ══════════════════════════════════════════════════
       SKILLS
    ══════════════════════════════════════════════════ */
    #skills { background: var(--bg-card); border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); }
    .skills-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(272px, 1fr)); gap: 1.1rem; }
    .skill-cat { background: var(--bg-card2); border: 1px solid var(--border); border-radius: 5px; padding: 1.2rem; transition: border-color 0.2s; }
    .skill-cat:hover { border-color: var(--border2); }
    .skill-cat-head {
      display: flex; align-items: center; gap: 0.55rem; margin-bottom: 0.8rem;
      padding-bottom: 0.7rem; border-bottom: 1px solid var(--border);
    }
    .skill-cat-icon { width: 28px; height: 28px; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; }
    .ic-blue { background: rgba(26,117,232,0.14); color: var(--accent); }
    .ic-amber { background: rgba(224,123,26,0.14); color: var(--accent2); }
    .ic-green { background: rgba(0,179,125,0.14); color: var(--accent3); }
    .ic-gray { background: rgba(122,143,168,0.14); color: var(--text-muted); }
    .skill-cat-name { font-size: 0.8rem; font-weight: 700; color: var(--text); }
    .skill-chips { display: flex; flex-wrap: wrap; gap: 0.35rem; }
    .skill-chip {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 2px; padding: 0.22rem 0.55rem; font-size: 0.72rem;
      color: var(--text-muted); font-family: var(--mono); transition: all 0.2s;
    }
    .skill-chip:hover { color: var(--text); border-color: rgba(26,117,232,0.38); }

    /* ══════════════════════════════════════════════════
       PROJECTS
    ══════════════════════════════════════════════════ */
    #projects { background: var(--bg); }
    .projects-toolbar { display: flex; align-items: center; gap: 0.85rem; flex-wrap: wrap; margin-top: 0.85rem; }
    .proj-count-badge {
      display: inline-flex; align-items: center; gap: 0.35rem;
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 3px; padding: 0.28rem 0.65rem;
      font-size: 0.72rem; color: var(--text-muted); font-family: var(--mono);
    }
    .btn-pdf {
      display: inline-flex; align-items: center; gap: 0.38rem;
      background: transparent; color: var(--accent2);
      border: 1px solid rgba(224,123,26,0.32); border-radius: 4px;
      padding: 0.36rem 0.8rem; font-size: 0.75rem; font-weight: 600;
      cursor: pointer; transition: all 0.2s; font-family: 'Inter', sans-serif;
    }
    .btn-pdf:hover { background: rgba(224,123,26,0.07); border-color: var(--accent2); }
    .btn-pdf.loading { opacity: 0.6; cursor: wait; }
    .projects-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(315px, 1fr)); gap: 1.1rem; margin-top: 1.75rem; }
    .project-card {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 5px; padding: 1.2rem;
      display: flex; flex-direction: column; gap: 0.55rem;
      transition: all 0.2s; text-decoration: none; color: inherit; position: relative; overflow: hidden;
    }
    .project-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0;
      height: 2px; background: var(--accent); opacity: 0; transition: opacity 0.2s;
    }
    .project-card:hover { border-color: var(--border2); transform: translateY(-2px); }
    .project-card:hover::before { opacity: 1; }
    .proj-head { display: flex; align-items: center; justify-content: space-between; }
    .proj-icon { font-size: 1.2rem; }
    .proj-lang {
      font-family: var(--mono); font-size: 0.65rem; color: var(--text-muted);
      background: var(--bg-card2); border: 1px solid var(--border); border-radius: 2px; padding: 0.13rem 0.45rem;
    }
    .proj-name { font-size: 0.875rem; font-weight: 700; color: var(--text); line-height: 1.4; }
    .proj-desc { font-size: 0.775rem; color: var(--text-muted); flex: 1; line-height: 1.65; }
    .proj-impact {
      display: inline-flex; align-items: center; gap: 0.28rem;
      font-size: 0.65rem; color: var(--accent3); font-weight: 600;
      background: rgba(0,179,125,0.07); border: 1px solid rgba(0,179,125,0.17);
      border-radius: 2px; padding: 0.12rem 0.4rem;
    }
    .proj-badges { display: flex; flex-wrap: wrap; gap: 0.28rem; }
    .proj-badge {
      font-family: var(--mono); font-size: 0.6rem; color: var(--accent);
      background: rgba(26,117,232,0.07); border: 1px solid rgba(26,117,232,0.17);
      border-radius: 2px; padding: 0.1rem 0.38rem;
    }
    .proj-role { font-size: 0.65rem; color: var(--text-muted); font-style: italic; }
    .proj-arrow { color: var(--border2); font-size: 0.72rem; margin-left: auto; margin-top: auto; transition: color 0.2s; }
    .project-card:hover .proj-arrow { color: var(--accent); }

    /* ══════════════════════════════════════════════════
       CONTRIBUTIONS
    ══════════════════════════════════════════════════ */
    #contributions { background: var(--bg-card); border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); }
    .contrib-box { background: var(--bg-card2); border: 1px solid var(--border); border-radius: 5px; padding: 1.5rem; max-width: 760px; margin: 0 auto; }
    .contrib-repo-head {
